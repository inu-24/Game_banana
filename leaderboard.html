<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard - Banana Math Puzzle</title>

    <link rel="stylesheet" href="style.css">

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

<header class="header">
    <nav class="navbar">
        <a href="home.html">Home</a>
        <a href="levels.html">Levels</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
    </nav>
</header>

<section class="section">

    <!-- BACK ARROW -->
    <a href="home.html" class="back-arrow">
        <i class='bx bx-arrow-back'></i>
    </a>

    <!-- TITLE -->
    <h1 class="leaderboard-title">🏆 Leaderboard</h1>

    <!-- LEADERBOARD TABLE -->
    <div class="leaderboard-container">

        <table>
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Player</th>
                    <th>Score</th>
                </tr>
            </thead>

            <tbody id="leaderboard-body">
                <!-- Dynamic content will load here -->
            </tbody>
        </table>

        <button class="clear-btn" onclick="clearLeaderboard()">
            Clear Leaderboard
        </button>

    </div>

</section>

<script>
function loadLeaderboard() {
    let tableBody = document.getElementById("leaderboard-body");

    // Check if "lastScore" exists in localStorage (from game page)
    let lastScore = localStorage.getItem("lastScore");
    let lastLevel = localStorage.getItem("lastLevel");
    if (lastScore !== null) {
        alert(`⏰ Time's Up! You scored ${lastScore} points on ${lastLevel} level!`);
        localStorage.removeItem("lastScore");
        localStorage.removeItem("lastLevel");
    }

    // First load local scores (for guests)
    let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

    if (leaderboard.length === 0) {
        tableBody.innerHTML = `
            <tr>
                <td colspan="3">No scores yet. Play the game!</td>
            </tr>
        `;
    } else {
        // Sort highest score first
        leaderboard.sort((a,b) => b.score - a.score);
        displayLeaderboard(leaderboard);
    }
    
    // Then fetch from database (will override if logged in)
    fetch('get_leaderboard.php')
        .then(response => response.json())
        .then(data => {
            if (!data.error && data.length > 0) {
                displayLeaderboard(data);
            }
        })
        .catch(err => console.log('Error loading database leaderboard'));
}

function displayLeaderboard(data) {
    let tableBody = document.getElementById("leaderboard-body");
    tableBody.innerHTML = "";
    
    data.forEach((player, index) => {
        let medal = "";
        if(index === 0) medal = " 🥇";
        else if(index === 1) medal = " 🥈";
        else if(index === 2) medal = " 🥉";
        
        let name = player.name || player.fullname;
        let score = player.score;
        
        let row = `
            <tr>
                <td>${index + 1}${medal}</td>
                <td>${name}</td>
                <td>${score}</td>
            </tr>
        `;
        
        tableBody.innerHTML += row;
    });
}

function clearLeaderboard(){
    localStorage.removeItem("leaderboard");
    loadLeaderboard();
}

// Load leaderboard when page opens
loadLeaderboard();
</script>

</body>
</html>
