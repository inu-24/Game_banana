<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Levels - Banana Math Puzzle</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Boxicons for back arrow -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

<header class="header">
    <nav class="navbar">
        <b><b><a href="home.html">Home</a></b></b>
        <b><b><a href="levels.html">Levels</a></b></b>
        <b><b><a href="leaderboard.html">Leaderboard</a></b></b>
        <b><b><a href="profile.html">Profile</a></b></b>
        <b><b><a href="settings.html">Settings</a></b></b>
    </nav>
</header>

<section class="section">

    <!-- BACK ARROW -->
    <a href="home.html" class="back-arrow">
        <i class='bx bx-arrow-back'></i>
    </a>

    <!-- PAGE TITLE -->
    <h1 class="levels-title">Choose Your Level</h1>

    <!-- LEVEL CARDS -->
    <div class="levels-container">

        <!-- EASY -->
        <div class="level-card">
            <h2>🍌 Easy</h2>
            <p>60 seconds to play</p>
            <p>Simple math equations</p>
            <p>Beginner friendly</p>
            <button onclick="location.href='game_easy.html'">Play</button>
        </div>

        <!-- MEDIUM --> 
        <div class="level-card">
            <h2>🍌🍌 Medium</h2>
            <p>45 seconds to play</p>
            <p>Moderate math equations</p>
            <p>Faster timer</p>
            <button onclick="location.href='game_medium.html'">Play</button>
        </div>

        <!-- HARD -->
        <div class="level-card">
            <h2>🍌🍌🍌 Hard</h2>
            <p>30 seconds to play</p>
            <p>Challenging math equations</p>
            <p>Very fast timer</p>
            <button onclick="location.href='game_hard.html'">Play</button>
        </div>

    </div>


</section>

<script>
if(localStorage.getItem("darkMode") === "enabled"){
    document.body.classList.add("dark-mode");
}
</script>

</body>
</html>
