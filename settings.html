<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings - Banana Math Puzzle</title>

    <link rel="stylesheet" href="style.css">

    <!-- Boxicons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>

<body>

<header class="header">
    <nav class="navbar">
        <b><b><a href="home.html">Home</a></b></b>
        <b><b><a href="levels.html">Levels</a></b></b>
        <b><b><a href="leaderboard.html">Leaderboard</a></b></b>
        <b><b><a href="profile.html">Profile</a></b></b>
        <b><b><a href="settings.html">Settings</a></b></b>
    </nav>
</header>

<section class="section">

    <!-- BACK ARROW -->
    <a href="home.html" class="back-arrow">
        <i class='bx bx-arrow-back'></i>
    </a>

    <!-- TITLE -->
    <h1 class="settings-title">⚙ Settings</h1>

    <!-- SETTINGS CARD -->
    <div class="settings-container">

        <div class="settings-card">

            <!-- SOUND -->
            <div class="setting-item">
                <span>🔊 Sound Effects</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- MUSIC -->
            <div class="setting-item">
                <span>🎵 Background Music</span>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <!-- DARK MODE -->
            <div class="setting-item">
                <span>🌙 Dark Mode</span>
                <label class="switch">
                    <input type="checkbox" id="darkModeToggle">
                    <span class="slider"></span>
                </label>
            </div>

            <!-- LOGOUT BUTTON -->
            <button class="logout-btn" onclick="location.href='login.html'">
                🚪 Logout
            </button>

        </div>

    </div>

</section>
<script>

const toggle = document.getElementById("darkModeToggle");

// Check saved mode
if(localStorage.getItem("darkMode") === "enabled"){
    document.body.classList.add("dark-mode");
    toggle.checked = true;
}

// Toggle function
toggle.addEventListener("change", function(){

    if(this.checked){
        document.body.classList.add("dark-mode");
        localStorage.setItem("darkMode", "enabled");
    } else {
        document.body.classList.remove("dark-mode");
        localStorage.setItem("darkMode", "disabled");
    }
    function logout() {
    fetch('logout.php')
        .then(() => {
            window.location.href = 'login.html';
        });
}

});

</script>

</body>
</html>
